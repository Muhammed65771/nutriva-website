<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 60" width="90" height="60">
  <!-- Red stripe -->
  <rect x="0" y="0" width="90" height="20" fill="#EF2B2D"/>
  <!-- White stripe -->
  <rect x="0" y="20" width="90" height="20" fill="#FFFFFF"/>
  <!-- Green stripe -->
  <rect x="0" y="40" width="90" height="20" fill="#009A44"/>
  <!-- Golden sun disk -->
  <circle cx="45" cy="30" r="9" fill="#F7BE00"/>
  <!-- 21 rays -->
  <g stroke="#F7BE00" stroke-width="1.4" stroke-linecap="round">
    <line x1="45" y1="17" x2="45" y2="13"/>
    <line x1="51.08" y1="18.85" x2="53.96" y2="15.97"/>
    <line x1="55.15" y1="24" x2="59.15" y2="22"/>
    <line x1="56.15" y1="30" x2="60.15" y2="30"/>
    <line x1="55.15" y1="36" x2="59.15" y2="38"/>
    <line x1="51.08" y1="41.15" x2="53.96" y2="44.03"/>
    <line x1="45" y1="43" x2="45" y2="47"/>
    <line x1="38.92" y1="41.15" x2="36.04" y2="44.03"/>
    <line x1="34.85" y1="36" x2="30.85" y2="38"/>
    <line x1="33.85" y1="30" x2="29.85" y2="30"/>
    <line x1="34.85" y1="24" x2="30.85" y2="22"/>
    <line x1="38.92" y1="18.85" x2="36.04" y2="15.97"/>
    <!-- 9 diagonal rays filling the gaps -->
    <line x1="48.5" y1="17.48" x2="50.18" y2="13.75"/>
    <line x1="53.5" y1="21.2" x2="57" y2="18.6"/>
    <line x1="55.95" y1="27" x2="59.8" y2="25.5"/>
    <line x1="55.95" y1="33" x2="59.8" y2="34.5"/>
    <line x1="53.5" y1="38.8" x2="57" y2="41.4"/>
    <line x1="48.5" y1="42.52" x2="50.18" y2="46.25"/>
    <line x1="41.5" y1="42.52" x2="39.82" y2="46.25"/>
    <line x1="36.5" y1="38.8" x2="33" y2="41.4"/>
    <line x1="34.05" y1="33" x2="30.2" y2="34.5"/>
    <line x1="34.05" y1="27" x2="30.2" y2="25.5"/>
    <line x1="36.5" y1="21.2" x2="33" y2="18.6"/>
    <line x1="41.5" y1="17.48" x2="39.82" y2="13.75"/>
