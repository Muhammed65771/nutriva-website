<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Nutriva AI</title>
  <meta name="description" content="Your Nutriva AI email address has been successfully confirmed." />
  <!-- No-index: this page should never appear in search results -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #EEF2FF 0%, #F0F9FF 50%, #F8FAFC 100%);
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(65, 105, 225, 0.12);
      text-align: center;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #4169E1, #6366F1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.5px;
    }

    .logo-badge {
      background: linear-gradient(135deg, #4169E1, #6366F1);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: #E0F2FE;
      color: #0284C7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-block;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(26, 26, 46, 0.15);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(26, 26, 46, 0.2);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">🥗</div>
      <div class="logo-text">Nutriva</div>
      <div class="logo-badge">AI</div>
    </div>

    <div class="success-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>

    <h1>Email Confirmed!</h1>
    <p class="subtitle">Thank you for verifying your email address. You can now return to the app to continue your journey.</p>
    
    <a href="nutrivaai://" class="btn" id="open-app-btn">Open Nutriva AI</a>
  </div>

  <script>
    // Optionally try to auto-redirect the user back to the app using the custom URI scheme
    setTimeout(() => {
      window.location.href = "nutrivaai://";
    }, 1000);
  </script>

</body>
</html>
