<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - Nutriva AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4169E1 0%, #00BFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }
    </style>
    <script>
        // Optional: Attempt to automatically open the app when the page loads
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "nutrivaai://";
            }, 1000);
        };
    </script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700/50 text-center relative overflow-hidden">
        
        <!-- Decorative Glow -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/20 rounded-full blur-3xl"></div>

        <div class="relative z-10 hidden" id="loadingState">
            <div class="w-16 h-16 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold text-white mb-2">Verifying...</h2>
            <p class="text-slate-400">Please wait while we confirm your email.</p>
        </div>

        <div class="relative z-10" id="successState">
            <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce-slow">
                <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h2 class="text-3xl font-bold text-white mb-3">Email Confirmed!</h2>
            <p class="text-slate-300 mb-8 text-lg">Your account is fully verified. You can now return to the Nutriva AI app and get started on your journey.</p>

            <a href="nutrivaai://" 
               class="block w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold py-4 px-8 rounded-2xl shadow-lg shadow-blue-500/25 transition-all transform hover:scale-[1.02] active:scale-95">
                Open Nutriva AI App
            </a>
            
            <p class="mt-6 text-sm text-slate-500">If the button doesn't work, slowly return to your home screen and open the app manually.</p>
        </div>

    </div>
</body>
</html>
